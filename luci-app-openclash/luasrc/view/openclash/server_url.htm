<%+cbi/valueheader%>
<script type="text/javascript">
//<![CDATA[
function padright(str, cnt, pad) {
    return str + Array(cnt + 1).join(pad);
}

function b64EncodeUnicode(str) {
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function (match, p1) {
        return String.fromCharCode('0x' + p1);
    }));
}

function b64encutf8safe(str) {
    return b64EncodeUnicode(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, '');
}

function b64DecodeUnicode(str) {
    return decodeURIComponent(Array.prototype.map.call(atob(str), function (c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
}

function b64decutf8safe(str) {
    var l;
    str = str.replace(/-/g, "+").replace(/_/g, "/");
    l = str.length;
    l = (4 - l % 4) % 4;
    if (l) str = padright(str, l, "=");
    return b64DecodeUnicode(str);
}

function b64encsafe(str) {
    return btoa(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, '')
}

function b64decsafe(str) {
    var l;
    str = str.replace(/-/g, "+").replace(/_/g, "/");
    l = str.length;
    l = (4 - l % 4) % 4;
    if (l) str = padright(str, l, "=");
    return atob(str);
}

function dictvalue(d, key) {
    var v = d[key];
    if (typeof (v) == 'undefined' || v == '') return '';
    return b64decsafe(v);
}

function parseUrl(url) {
    var m = url.match(/^(([^:\/?#]+:)?(?:\/\/((?:(?:([^\/?#:]*)(?::([^\/?#:]*))?)@)?([^\/?#:]*)(?::([^\/?#:]*))?)))?([^?#]*)(\?[^#]*)?(#.*)?$/);
    if (!m) {
        try {
            var u = new URL(url);
            return {
                hash: u.hash || "",
                host: u.host || "",
                hostname: u.hostname || "",
                href: u.href || "",
                origin: u.origin || "",
                pathname: u.pathname || "",
                port: u.port || "",
                protocol: u.protocol || "",
                search: u.search || "",
                username: u.username || "",
                password: u.password || ""
            };
        } catch (e) {
            return null;
        }
    }
    return {
        hash: m[10] || "",
        host: m[3] || "",
        hostname: m[6] || "",
        href: m[0] || "",
        origin: m[1] || "",
        pathname: m[8] || (m[1] ? "/" : ""),
        port: m[7] || "",
        protocol: m[2] || "",
        search: m[9] || "",
        username: m[4] || "",
        password: m[5] || ""
    };
}

function decodeFragment(fragment) {
    if (!fragment) return '';
    try {
        var decoded = decodeURIComponent(fragment);
        while (decoded !== fragment) {
            fragment = decoded;
            decoded = decodeURIComponent(fragment);
        }
        return fragment;
    } catch (e) {
        return fragment;
    }
}

function parseQuery(search) {
    var query = {};
    if (search && search.length > 1) {
        var params = search.substring(1).split('&');
        for (var i = 0; i < params.length; i++) {
            var eqIndex = params[i].indexOf('=');
            if (eqIndex !== -1) {
                var key = params[i].substring(0, eqIndex);
                var value = params[i].substring(eqIndex + 1);
                try {
                    key = decodeURIComponent(key);
                    if (query.hasOwnProperty(key)) {
                        if (isYamlListLikeKey(key) || key === 'port' || key === 'protocol') {
                            query[key] = String(query[key]) + ',' + value;
                        } else {
                            query[key] = value;
                        }
                    } else {
                        query[key] = value;
                    }
                } catch (e) {
                    if (query.hasOwnProperty(key)) {
                        if (isYamlListLikeKey(key) || key === 'port' || key === 'protocol') {
                            query[key] = String(query[key]) + ',' + value;
                        } else {
                            query[key] = value;
                        }
                    } else {
                        query[key] = value;
                    }
                }
            }
        }
    }
    return query;
}

function getFormElements(sid, field) {
    var baseName = 'cbid.openclash.' + sid + '.' + field;
    var multiValueField = isMultiValueField(field);

    if (multiValueField) {
        var multiList = document.getElementsByName(baseName + '[]');
        if (multiList && multiList.length > 0) return multiList;
    }

    var list = document.getElementsByName(baseName);
    if (list && list.length > 0) return list;

    list = document.getElementsByName(baseName + '[]');
    if (list && list.length > 0) return list;

    var byId = document.getElementById(baseName);
    if (byId) return [byId];

    return [];
}

function dispatchFieldChange(element) {
    var inputEvent = document.createEvent("HTMLEvents");
    inputEvent.initEvent("input", true, true);
    element.dispatchEvent(inputEvent);

    var event = document.createEvent("HTMLEvents");
    event.initEvent("change", true, true);
    element.dispatchEvent(event);
}

function getCodeMirrorInstance(element) {
    if (!element || !element.tagName || element.tagName.toLowerCase() !== 'textarea') return null;

    if (element.nextSibling && element.nextSibling.CodeMirror) {
        return element.nextSibling.CodeMirror;
    }

    if (element.parentNode) {
        var cmNode = element.parentNode.querySelector('.CodeMirror');
        if (cmNode && cmNode.CodeMirror) {
            return cmNode.CodeMirror;
        }
    }

    return null;
}

function setElementValue(element, value) {
    var normalized = String(value == null ? '' : value);

    var type = (element.type || '').toLowerCase();
    if (type === 'checkbox') {
        var checked = /^(1|true|on|yes)$/i.test(normalized);
        element.checked = checked;
        if (!element.value) {
            element.value = '1';
        }
        dispatchFieldChange(element);
        return;
    }

    if (type === 'radio') {
        element.checked = String(element.value) === normalized;
        dispatchFieldChange(element);
        return;
    }

    element.value = normalized;

    var cm = getCodeMirrorInstance(element);
    if (cm) {
        cm.setValue(normalized);
        cm.save();
    }

    dispatchFieldChange(element);
}

function getElementValue(element) {
    var cm = getCodeMirrorInstance(element);
    if (cm) {
        return cm.getValue();
    }
    return element.value;
}

function getDynamicListContainer(sid, field) {
    var baseName = 'cbid.openclash.' + sid + '.' + field;
    return document.querySelector('div[data-prefix="' + baseName + '"]');
}

function getDynamicListInputs(sid, field) {
    var baseName = 'cbid.openclash.' + sid + '.' + field;
    var container = getDynamicListContainer(sid, field);
    if (!container) return [];
    var selector = 'input[name="' + baseName + '"], input[name="' + baseName + '[]"]';
    var nodeList = container.querySelectorAll(selector);
    return Array.prototype.slice.call(nodeList || []);
}

function syncDynamicListSelect(inputElement, value) {
    if (!inputElement || !inputElement.id) return;

    var select = document.getElementById('cbi.combobox.' + inputElement.id);
    if (!select) return;

    var target = String(value == null ? '' : value);
    var hasOption = false;
    for (var i = 0; i < select.options.length; i++) {
        if (select.options[i].value === target) {
            hasOption = true;
            break;
        }
    }

    if (hasOption) {
        select.value = target;
    } else {
        if (target === '') {
            select.value = '';
        } else {
            var option = document.createElement('option');
            option.value = target;
            option.text = target;

            var customOption = null;
            for (var j = 0; j < select.options.length; j++) {
                if (select.options[j].value === '') {
                    customOption = select.options[j];
                    break;
                }
            }

            if (customOption && customOption.parentNode) {
                customOption.parentNode.insertBefore(option, customOption);
            } else {
                select.appendChild(option);
            }
            select.value = target;
        }
    }

    dispatchFieldChange(select);
}

function tryExpandDynamicListRows(sid, field, targetCount) {
    var container = getDynamicListContainer(sid, field);
    if (!container) return false;

    var currentInputs = getDynamicListInputs(sid, field);
    if (currentInputs.length >= targetCount) return true;

    var buttons = container.querySelectorAll('img.cbi-image-button');
    if (!buttons || buttons.length === 0) return false;

    var clicked = false;
    for (var i = buttons.length - 1; i >= 0; i--) {
        var button = buttons[i];
        var src = String(button.getAttribute('src') || '').toLowerCase();
        if (src.indexOf('add.gif') !== -1) {
            button.click();
            clicked = true;
            break;
        }
    }

    return clicked;
}

function normalizeListValue(value) {
    var str = String(value == null ? '' : value).trim();
    if (str === '') return [];
    var parts = str.split(',');
    var result = [];
    for (var i = 0; i < parts.length; i++) {
        var item = parts[i].trim();
        if (item !== '') result.push(item);
    }
    return result;
}

function isMultiValueField(field) {
    return {
        alpn: true,
        hysteria_alpn: true,
        tc_alpn: true,
        ws_opts_headers: true,
        trojan_ws_headers: true,
        http_headers: true,
        h2_host: true,
        http_path: true,
        wg_dns: true,
        host_key: true,
        host_key_algorithms: true,
        masque_dns: true
    }[field] === true;
}

function setFormValue(sid, field, value, retry) {
    var retries = typeof retry === 'number' ? retry : 0;
    var multiValueField = isMultiValueField(field);
    var normalized = String(value == null ? '' : value);
    var listValues = normalizeListValue(normalized);

    if (multiValueField) {
        var targetCount = Math.max(1, listValues.length);
        var dynInputs = getDynamicListInputs(sid, field);

        if (dynInputs.length > 0 && dynInputs.length < targetCount && retries < 30) {
            tryExpandDynamicListRows(sid, field, targetCount);
            setTimeout(function() {
                setFormValue(sid, field, value, retries + 1);
            }, 60);
            return;
        }

        if (dynInputs.length > 0) {
            for (var idx = 0; idx < dynInputs.length; idx++) {
                var itemValue = idx < listValues.length ? listValues[idx] : '';
                setElementValue(dynInputs[idx], itemValue);
                syncDynamicListSelect(dynInputs[idx], itemValue);
            }
            return;
        }
    }

    var elements = getFormElements(sid, field);

    if ((!elements || elements.length === 0) && retries < 30) {
        setTimeout(function() {
            setFormValue(sid, field, value, retries + 1);
        }, 60);
        return;
    }

    if (!elements || elements.length === 0) return;

    if (multiValueField && elements.length > 1) {
        for (var i = 0; i < elements.length; i++) {
            setElementValue(elements[i], i < listValues.length ? listValues[i] : '');
        }
        return;
    }

    var primary = elements[0];
    for (var j = 0; j < elements.length; j++) {
        var candidate = elements[j];
        if (!candidate) continue;
        if ((candidate.type || '').toLowerCase() !== 'hidden') {
            primary = candidate;
            break;
        }
    }

    setElementValue(primary, normalized);
}

function decodeURIComponentSafe(value) {
    if (typeof value !== 'string') return value;
    try {
        return decodeURIComponent(value);
    } catch (e) {
        return value;
    }
}

function stripYamlQuotes(value) {
    var v = (value || '').trim();
    if (v.length >= 2) {
        var first = v.charAt(0);
        var last = v.charAt(v.length - 1);
        if ((first === '"' && last === '"') || (first === "'" && last === "'")) {
            return v.substring(1, v.length - 1);
        }
    }
    return v;
}

function encodeYamlScalar(value) {
    var v = value;
    if (typeof v === 'boolean' || typeof v === 'number') {
        return String(v);
    }
    v = String(v == null ? '' : v);
    if (/^(true|false|null)$/i.test(v) || /^-?\d+(\.\d+)?$/.test(v)) {
        return v;
    }
    return '"' + v.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
}

function buildOtherParameterBlock(key, value) {
    var lines = [];
    if (Array.isArray(value)) {
        lines.push('    ' + key + ':');
        for (var i = 0; i < value.length; i++) {
            lines.push('      - ' + encodeYamlScalar(value[i]));
        }
    } else {
        lines.push('    ' + key + ': ' + encodeYamlScalar(value));
    }
    return lines;
}

function keepOnlyCommentLines(text) {
    var source = (text || '').replace(/\r\n?/g, '\n');
    var lines = source === '' ? [] : source.split('\n');
    var kept = [];
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (/^\s*$/.test(line) || /^\s*#/.test(line)) {
            kept.push(line);
        }
    }
    while (kept.length > 0 && /^\s*$/.test(kept[kept.length - 1])) {
        kept.pop();
    }
    return kept.join('\n');
}

var currentImportOtherParamsState = null;

function beginImportOtherParameters(sid) {
    var oldText = getFormValue(sid, 'other_parameters') || '';
    var cleaned = keepOnlyCommentLines(oldText);
    setFormValue(sid, 'other_parameters', cleaned);
    currentImportOtherParamsState = {
        sid: String(sid),
        commentsText: cleaned,
        params: {}
    };
}

function endImportOtherParameters() {
    currentImportOtherParamsState = null;
}

function rebuildOtherParametersFromState(state) {
    if (!state || !state.params) return '';
    var lines = [];
    for (var key in state.params) {
        if (!state.params.hasOwnProperty(key)) continue;
        var value = state.params[key];
        if (value == null || value === '') continue;
        var block = buildOtherParameterBlock(key, value);
        if (lines.length > 0) {
            lines.push('');
        }
        Array.prototype.push.apply(lines, block);
    }
    var paramsText = lines.join('\n');
    var commentsText = (state.commentsText || '').replace(/\r\n?/g, '\n').replace(/\n+$/, '');
    if (commentsText && paramsText) {
        return commentsText + '\n' + paramsText;
    }
    return commentsText || paramsText;
}

function upsertOtherParameterText(text, key, value) {
    var source = (text || '').replace(/\r\n?/g, '\n');
    var lines = source === '' ? [] : source.split('\n');
    var block = buildOtherParameterBlock(key, value);
    var keyRegex = new RegExp('^ {4}' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ':\\s*(.*)$');
    var topLevelRegex = /^ {4}[A-Za-z0-9_-]+:\s*(.*)$/;

    var start = -1;
    for (var i = 0; i < lines.length; i++) {
        if (keyRegex.test(lines[i])) {
            start = i;
            break;
        }
    }

    if (start === -1) {
        if (lines.length > 0 && lines[lines.length - 1] !== '') {
            lines.push('');
        }
        Array.prototype.push.apply(lines, block);
        return lines.join('\n').replace(/^\n+/, '').replace(/\n+$/, '');
    }

    var end = start + 1;
    for (; end < lines.length; end++) {
        var line = lines[end];
        if (topLevelRegex.test(line)) break;
        if (/^\S/.test(line)) break;
    }

    lines.splice.apply(lines, [start, end - start].concat(block));
    return lines.join('\n').replace(/^\n+/, '').replace(/\n+$/, '');
}

function mergeUnknownParamsToOtherParameters(sid, params) {
    if (!params) return;

    if (currentImportOtherParamsState && currentImportOtherParamsState.sid === String(sid)) {
        var hasStateChanges = false;
        for (var stateKey in params) {
            if (!params.hasOwnProperty(stateKey)) continue;
            var stateValue = params[stateKey];
            if (stateValue == null || stateValue === '') continue;
            currentImportOtherParamsState.params[stateKey] = stateValue;
            hasStateChanges = true;
        }
        if (hasStateChanges) {
            setFormValue(sid, 'other_parameters', rebuildOtherParametersFromState(currentImportOtherParamsState));
        }
        return;
    }

    var text = getFormValue(sid, 'other_parameters') || '';
    var hasChanges = false;
    for (var key in params) {
        if (!params.hasOwnProperty(key)) continue;
        var value = params[key];
        if (value == null || value === '') continue;
        text = upsertOtherParameterText(text, key, value);
        hasChanges = true;
    }
    if (hasChanges) {
        setFormValue(sid, 'other_parameters', text);
    }
}

function parseOtherParameters(text) {
    var source = (text || '').replace(/\r\n?/g, '\n');
    var lines = source === '' ? [] : source.split('\n');
    var map = {};
    var i = 0;

    while (i < lines.length) {
        var line = lines[i];
        var match = line.match(/^ {4}([A-Za-z0-9_-]+):\s*(.*)$/);
        if (!match) {
            i++;
            continue;
        }

        var key = match[1];
        var rest = (match[2] || '').trim();
        if (rest !== '') {
            if (rest.charAt(0) === '#') {
                i++;
                continue;
            }
            if (/^\[.*\]$/.test(rest)) {
                var body = rest.substring(1, rest.length - 1).trim();
                if (body === '') {
                    map[key] = [];
                } else {
                    var parts = body.split(',');
                    var arr = [];
                    for (var p = 0; p < parts.length; p++) {
                        arr.push(stripYamlQuotes(parts[p].trim()));
                    }
                    map[key] = arr;
                }
            } else {
                map[key] = stripYamlQuotes(rest);
            }
            i++;
            continue;
        }

        var arrValues = [];
        var j = i + 1;
        while (j < lines.length) {
            var arrMatch = lines[j].match(/^ {6}-\s*(.*)$/);
            if (arrMatch) {
                arrValues.push(stripYamlQuotes(arrMatch[1].trim()));
                j++;
                continue;
            }
            if (/^ {4}[A-Za-z0-9_-]+:\s*(.*)$/.test(lines[j]) || /^\S/.test(lines[j])) {
                break;
            }
            j++;
        }

        if (arrValues.length > 0) {
            map[key] = arrValues;
        }
        i = j;
    }

    return map;
}

function mergeOtherParametersToQuery(sid, queryMap, keyMap, skipKeys) {
    var otherText = getFormValue(sid, 'other_parameters') || '';
    var other = parseOtherParameters(otherText);
    for (var key in other) {
        if (!other.hasOwnProperty(key)) continue;
        if (skipKeys && skipKeys[key]) continue;
        var value = other[key];
        var mappedKey = keyMap && keyMap[key] ? keyMap[key] : key;
        if (Array.isArray(value)) {
            queryMap[mappedKey] = value.join(',');
        } else {
            queryMap[mappedKey] = value;
        }
    }
}

function queryMapToString(queryMap) {
    var query = [];
    for (var key in queryMap) {
        if (!queryMap.hasOwnProperty(key)) continue;
        var value = queryMap[key];
        if (value == null || value === '') continue;
        query.push(encodeURIComponent(key) + '=' + encodeURIComponent(String(value)));
    }
    return query.join('&');
}

function isYamlListLikeKey(key) {
    return {
        alpn: true,
        dns: true,
        'host-key': true,
        'host-key-algorithms': true
    }[key] === true;
}

function normalizeUnknownParamValueByKey(key, value) {
    if (!isYamlListLikeKey(key)) {
        return value;
    }

    if (Array.isArray(value)) {
        var normalizedList = [];
        for (var i = 0; i < value.length; i++) {
            var item = String(value[i] == null ? '' : value[i]).trim();
            if (item) normalizedList.push(item);
        }
        return normalizedList;
    }

    var raw = String(value == null ? '' : value);
    var parts = raw.split(',');
    var result = [];
    for (var j = 0; j < parts.length; j++) {
        var part = parts[j].trim();
        if (part) result.push(part);
    }
    return result;
}

function collectUnknownQueryParams(query, knownKeys) {
    var result = {};
    for (var key in query) {
        if (!query.hasOwnProperty(key)) continue;
        if (knownKeys && knownKeys[key]) continue;
        result[key] = normalizeUnknownParamValueByKey(key, decodeURIComponentSafe(query[key]));
    }
    return result;
}

function remapParamKeys(params, keyMap) {
    if (!params) return {};
    var result = {};
    for (var key in params) {
        if (!params.hasOwnProperty(key)) continue;
        var mappedKey = keyMap && keyMap[key] ? keyMap[key] : key;
        result[mappedKey] = normalizeUnknownParamValueByKey(mappedKey, params[key]);
    }
    return result;
}

function getDefaultOtherParamSkipKeys() {
    return {
        name: true,
        type: true,
        server: true,
        port: true,
        username: true,
        password: true,
        uuid: true,
        token: true,
        auth_name: true,
        auth_pass: true
    };
}

function export_url(btn, urlname, sid) {
    var s = document.getElementById(urlname + '-status');
    if (!s) return false;

    var v_type = document.getElementsByName('cbid.openclash.' + sid + '.type')[0];
    if (!v_type) return false;

    var type = v_type.value.toLowerCase();
    var url = null;

    try {
        switch (type) {
            case "ss":
                url = exportSS(sid);
                break;
            case "ssr":
                url = exportSSR(sid);
                break;
            case "vmess":
                url = exportVmess(sid);
                break;
            case "vless":
                url = exportVless(sid);
                break;
            case "trojan":
                url = exportTrojan(sid);
                break;
            case "hysteria":
                url = exportHysteria(sid);
                break;
            case "hysteria2":
                url = exportHysteria2(sid);
                break;
            case "tuic":
                url = exportTuic(sid);
                break;
            case "socks5":
                url = exportSocks(sid);
                break;
            case "http":
                url = exportHttp(sid);
                break;
            case "anytls":
                url = exportAnyTLS(sid);
                break;
            case "mieru":
                url = exportMieru(sid);
                break;
            default:
                s.innerHTML = "<font style=\"color:red\"><%:Unsupported protocol type%></font>";
                return false;
        }

        if (url) {
            var textarea = document.createElement("textarea");
            textarea.textContent = url;
            textarea.style.position = "fixed";
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand("copy");
                s.innerHTML = "<font style=\"color:green\"><%:Copy%> " + type.toUpperCase() + " <%:to clipboard successfully%></font>";
            } catch (ex) {
                s.innerHTML = "<font style=\"color:red\"><%:Unable to copy%> " + type.toUpperCase() + " <%:to clipboard%></font>";
            } finally {
                document.body.removeChild(textarea);
            }
        } else {
            s.innerHTML = "<font style=\"color:red\"><%:Export failed%></font>";
        }
    } catch (e) {
        s.innerHTML = "<font style=\"color:red\"><%:Export error%></font>";
        return false;
    }

    return false;
}

function getFormValue(sid, field) {
    if (isMultiValueField(field)) {
        var dynInputs = getDynamicListInputs(sid, field);
        if (dynInputs && dynInputs.length > 0) {
            var dynValues = [];
            for (var di = 0; di < dynInputs.length; di++) {
                var dynValue = getElementValue(dynInputs[di]);
                if (dynValue != null && dynValue !== '') {
                    dynValues.push(dynValue);
                }
            }
            return dynValues.join(',');
        }
    }

    var elements = getFormElements(sid, field);
    if (!elements || elements.length === 0) return '';
    if (elements.length === 1 || !isMultiValueField(field)) return getElementValue(elements[0]);

    var values = [];
    for (var i = 0; i < elements.length; i++) {
        var elementValue = getElementValue(elements[i]);
        if (elementValue != null && elementValue !== '') {
            values.push(elementValue);
        }
    }
    return values.join(',');
}

function exportSS(sid) {
    var server = getFormValue(sid, 'server');
    var port = getFormValue(sid, 'port');
    var password = getFormValue(sid, 'password');
    var cipher = getFormValue(sid, 'cipher');
    var name = getFormValue(sid, 'name');
    var obfs = getFormValue(sid, 'obfs');
    var host = getFormValue(sid, 'host');
    var path = getFormValue(sid, 'path');
    var tls = getFormValue(sid, 'tls');

    if (!server || !port || !password || !cipher) {
        return null;
    }

    // SIP002 format
    var userInfo = b64encsafe(cipher + ':' + password);
    var url = userInfo + '@' + server + ':' + port + '/?';

    var queryMap = {};

    if (obfs && obfs !== 'none') {
        var plugin = '';
        if (obfs === 'http' || obfs === 'tls') {
            plugin = 'obfs-local;obfs=' + obfs;
            if (host) {
                plugin += ';obfs-host=' + host;
            }
        } else if (obfs === 'websocket') {
            plugin = 'v2ray-plugin;mode=websocket';
            if (host) {
                plugin += ';host=' + host;
            }
            if (path) {
                plugin += ';path=' + path;
            }
            if (tls === 'true') {
                plugin += ';tls=true';
            }
        }
        if (plugin) {
            queryMap.plugin = plugin;
        }
    }

    if (getFormValue(sid, 'udp_over_tcp') === 'true') {
        queryMap.uot = '1';
    }

    mergeOtherParametersToQuery(sid, queryMap, null, getDefaultOtherParamSkipKeys());
    url += queryMapToString(queryMap);

    if (name) {
        url += '#' + encodeURIComponent(name);
    }

    return 'ss://' + url;
}

function exportVmess(sid) {
    var server = getFormValue(sid, 'server');
    var port = getFormValue(sid, 'port');
    var uuid = getFormValue(sid, 'uuid');
    var alterId = getFormValue(sid, 'alterId');
    var security = getFormValue(sid, 'securitys');
    var name = getFormValue(sid, 'name');
    var obfs = getFormValue(sid, 'obfs_vmess');
    var tls = getFormValue(sid, 'tls');
    var servername = getFormValue(sid, 'servername');
    var clientFingerprint = getFormValue(sid, 'client_fingerprint');

    if (!server || !port || !uuid) {
        return null;
    }

    var info = {
        "v": "2",
        "ps": name || "",
        "add": server,
        "port": port,
        "id": uuid,
        "aid": alterId || "0",
        "scy": security || "auto",
        "net": "tcp",
        "type": "none",
        "host": "",
        "path": "",
        "tls": tls === 'true' ? "tls" : ""
    };

    if (tls === 'true' && servername) {
        info.sni = servername;
    }

    if (clientFingerprint) {
        info.fp = clientFingerprint;
    }

    // Handle network type
    if (obfs === 'websocket') {
        info.net = "ws";
        info.path = getFormValue(sid, 'ws_opts_path') || '/';
        var headers = getFormValue(sid, 'ws_opts_headers');
        if (headers && headers.includes('Host:')) {
            info.host = headers.split('Host:')[1].trim();
        }
    } else if (obfs === 'h2') {
        info.net = "h2";
        info.path = getFormValue(sid, 'h2_path') || '/';
        info.host = getFormValue(sid, 'h2_host') || '';
    } else if (obfs === 'grpc') {
        info.net = "grpc";
        info.path = getFormValue(sid, 'grpc_service_name') || '';
    }

    var other = parseOtherParameters(getFormValue(sid, 'other_parameters') || '');
    for (var key in other) {
        if (!other.hasOwnProperty(key)) continue;
        if (getDefaultOtherParamSkipKeys()[key]) continue;
        var val = other[key];
        if (Array.isArray(val)) {
            info[key] = val.join(',');
        } else {
            info[key] = val;
        }
    }

    return "vmess://" + b64EncodeUnicode(JSON.stringify(info));
}

function parseSS(body, sid) {
    var url0, param = "";
    var sipIndex = body.indexOf("@");
    var ploc = body.indexOf("#");

    if (ploc > 0) {
        url0 = body.substr(0, ploc);
        param = body.substr(ploc + 1);
    } else {
        url0 = body;
    }

    setFormValue(sid, 'type', 'ss');

    if (sipIndex !== -1) {
        // SIP002 format
        var userInfo = b64decsafe(url0.substr(0, sipIndex));
        var temp = url0.substr(sipIndex + 1).split("/?");
        var serverInfo = temp[0].split(":");
        var server = serverInfo[0];
        var port = serverInfo[1];
        var method, password;

        if (temp[1]) {
            var query = parseQuery("?" + temp[1]);
            var knownQueryKeys = {
                plugin: true,
                'udp-over-tcp': true,
                uot: true
            };

            if (query.plugin) {
                var decodedPlugin = decodeURIComponent(query.plugin);

                var pluginParts = decodedPlugin.split(';');
                var pluginName = pluginParts[0];

                // obfs-local
                if (pluginName === 'obfs-local' || pluginName.includes('obfs')) {
                    var obfsMode = 'http';
                    var obfsHost = '';

                    for (var i = 1; i < pluginParts.length; i++) {
                        var opt = pluginParts[i];
                        var eqIndex = opt.indexOf('=');
                        if (eqIndex !== -1) {
                            var key = opt.substring(0, eqIndex).trim();
                            var value = opt.substring(eqIndex + 1).trim();

                            if (key === 'obfs') {
                                obfsMode = value;
                            } else if (key === 'obfs-host') {
                                obfsHost = value;
                            }
                        }
                    }

                    setFormValue(sid, 'obfs', obfsMode);
                    if (obfsHost) {
                        setFormValue(sid, 'host', obfsHost);
                    }
                }

                // v2ray-plugin
                if (pluginName === 'v2ray-plugin') {
                    var v2rayMode = 'websocket';
                    var v2rayHost = '';
                    var v2rayPath = '/';
                    var v2rayTls = false;

                    for (var i = 1; i < pluginParts.length; i++) {
                        var opt = pluginParts[i];
                        var eqIndex = opt.indexOf('=');
                        if (eqIndex !== -1) {
                            var key = opt.substring(0, eqIndex).trim();
                            var value = opt.substring(eqIndex + 1).trim();

                            if (key === 'mode') {
                                v2rayMode = value;
                            } else if (key === 'host') {
                                v2rayHost = value;
                            } else if (key === 'path') {
                                v2rayPath = value;
                            } else if (key === 'tls') {
                                v2rayTls = value === 'true' || value === '1';
                            }
                        }
                    }

                    setFormValue(sid, 'obfs', 'websocket');
                    if (v2rayHost) {
                        setFormValue(sid, 'host', v2rayHost);
                    }
                    if (v2rayPath) {
                        setFormValue(sid, 'path', v2rayPath);
                    }
                    if (v2rayTls) {
                        setFormValue(sid, 'tls', 'true');
                    }
                }
            }

            if (query['udp-over-tcp'] === 'true' || query['uot'] === '1') {
                setFormValue(sid, 'udp_over_tcp', 'true');
            }

            mergeUnknownParamsToOtherParameters(sid, collectUnknownQueryParams(query, knownQueryKeys));
        }

        var userInfoSplitIndex = userInfo.indexOf(":");
        if (userInfoSplitIndex !== -1) {
            method = userInfo.substr(0, userInfoSplitIndex);
            password = userInfo.substr(userInfoSplitIndex + 1);
        }

        setFormValue(sid, 'server', server);
        setFormValue(sid, 'port', port);
        setFormValue(sid, 'password', password || "");
        setFormValue(sid, 'cipher', method || "");
    } else {
        // Legacy format
        var sstr = b64decsafe(url0);
        var team = sstr.split('@');
        var part1 = team[0].split(':');
        var part2 = team[1].split(':');

        setFormValue(sid, 'server', part2[0]);
        setFormValue(sid, 'port', part2[1]);
        setFormValue(sid, 'password', part1[1]);
        setFormValue(sid, 'cipher', part1[0]);
    }

    if (param) {
        setFormValue(sid, 'name', decodeURIComponent(param));
    }

    return true;
}

function parseSSR(body, sid) {
    var dcBuf;
    try {
        dcBuf = b64decsafe(body);
    } catch (e) {
        return false;
    }

    setFormValue(sid, 'type', 'ssr');

    // ssr://host:port:protocol:method:obfs:urlsafebase64pass/?obfsparam=...
    var before, after;
    var queryIndex = dcBuf.indexOf('/?');
    if (queryIndex > 0) {
        before = dcBuf.substr(0, queryIndex);
        after = dcBuf.substr(queryIndex + 2);
    } else {
        before = dcBuf;
        after = "";
    }

    var parts = before.split(':');
    if (parts.length !== 6) {
        return false;
    }

    var host = parts[0];
    var port = parts[1];
    var protocol = parts[2];
    var method = parts[3];
    var obfs = parts[4];
    var password = b64decsafe(parts[5]);

    setFormValue(sid, 'server', host);
    setFormValue(sid, 'port', port);
    setFormValue(sid, 'protocol', protocol);
    setFormValue(sid, 'cipher_ssr', method);
    setFormValue(sid, 'obfs_ssr', obfs);
    setFormValue(sid, 'password', password);

    if (after) {
        var params = {};
        var paramPairs = after.split('&');
        for (var i = 0; i < paramPairs.length; i++) {
            var pair = paramPairs[i].split('=');
            if (pair.length === 2) {
                var key = decodeURIComponent(pair[0]);
                var value = pair[1];
                params[key] = value;
            }
        }

        if (params.obfsparam) {
            setFormValue(sid, 'obfs_param', b64decsafe(params.obfsparam));
        }

        if (params.protoparam) {
            setFormValue(sid, 'protocol_param', b64decsafe(params.protoparam));
        }

        if (params.remarks) {
            setFormValue(sid, 'name', b64decutf8safe(params.remarks));
        }

        mergeUnknownParamsToOtherParameters(sid, collectUnknownQueryParams(params, {
            obfsparam: true,
            protoparam: true,
            remarks: true
        }));
    }

    return true;
}

function parseVmess(body, sid) {
    try {
        // Try V2rayN format first
        var sstr = b64DecodeUnicode(body);
        var ssm = JSON.parse(sstr);

        setFormValue(sid, 'type', 'vmess');

        setFormValue(sid, 'port', ssm.port);

        setFormValue(sid, 'uuid', ssm.id);

        if (ssm.scy) {
            setFormValue(sid, 'securitys', ssm.scy);
        }

        if (ssm.tls === "tls") {
            setFormValue(sid, 'tls', 'true');
            if (ssm.sni) {
                setFormValue(sid, 'servername', ssm.sni);
            }
        }

        if (ssm.fp) {
            setFormValue(sid, 'client_fingerprint', ssm.fp);
        }

        var network = (ssm.net || 'tcp').toLowerCase();
        if (network === 'ws') {
            setFormValue(sid, 'obfs_vmess', 'websocket');
            setFormValue(sid, 'ws_opts_path', ssm.path || '/');
            if (ssm.host) {
                setFormValue(sid, 'ws_opts_headers', 'Host: ' + ssm.host);
            }
        } else if (network === 'h2') {
            setFormValue(sid, 'obfs_vmess', 'h2');
            setFormValue(sid, 'h2_path', ssm.path || '/');
            if (ssm.host) {
                setFormValue(sid, 'h2_host', ssm.host);
            }
        } else if (network === 'tcp') {
            if (ssm.type === 'http') {
                setFormValue(sid, 'obfs_vmess', 'http');
                if (ssm.path) {
                    setFormValue(sid, 'http_path', ssm.path);
                }
                if (ssm.host) {
                    mergeUnknownParamsToOtherParameters(sid, {
                        host: ssm.host
                    });
                }
            } else {
                setFormValue(sid, 'obfs_vmess', 'none');
            }
        } else if (network === 'grpc') {
            setFormValue(sid, 'obfs_vmess', 'grpc');
            setFormValue(sid, 'grpc_service_name', ssm.path || '');

        var knownVmessJsonKeys = {

            net: true,

            host: true,
            path: true,
            tls: true,
            sni: true,
            fp: true
        };
        var vmessUnknown = {};
        for (var vk in ssm) {
            if (!ssm.hasOwnProperty(vk)) continue;
            if (knownVmessJsonKeys[vk]) continue;
            if (ssm[vk] == null) continue;
            if (typeof ssm[vk] === 'object') continue;
            vmessUnknown[vk] = normalizeUnknownParamValueByKey(vk, String(ssm[vk]));
        }
        mergeUnknownParamsToOtherParameters(sid, vmessUnknown);

        return true;
    } catch (e) {
        // Try Xray VMessAEAD format
        try {

            if (!parsed) return false;

            var query = parseQuery(parsed.search);
            var network = (query.type || 'tcp').toLowerCase();

            setFormValue(sid, 'type', 'vmess');
            if (network === 'ws') {
                setFormValue(sid, 'obfs_vmess', 'websocket');
            } else if (network === 'grpc') {
                setFormValue(sid, 'obfs_vmess', 'grpc');
            } else if (network === 'http') {

            } else if (network === 'h2') {
                setFormValue(sid, 'obfs_vmess', 'h2');
            } else {

            }

            setFormValue(sid, 'server', parsed.hostname);
            setFormValue(sid, 'port', parsed.port || '443');
            setFormValue(sid, 'uuid', decodeURIComponentSafe(parsed.username));
            setFormValue(sid, 'alterId', 0);
            setFormValue(sid, 'securitys', query.encryption || 'auto');

            var security = (query.security || '').toLowerCase();
            if (security === 'tls' || security === 'xtls' || security === 'reality') {
                setFormValue(sid, 'tls', 'true');
            }

            if (query.sni) {
                setFormValue(sid, 'servername', decodeURIComponentSafe(query.sni));
            }

            if (query.fp) {

                if (query.host) {
                    setFormValue(sid, 'ws_opts_headers', 'Host: ' + decodeURIComponentSafe(query.host));
                }
            } else if (network === 'grpc') {
                setFormValue(sid, 'grpc_service_name', decodeURIComponentSafe(query.serviceName || query.path || ''));
            } else if (network === 'http') {
                if (query.path) {

                }
            } else if (network === 'h2') {
                if (query.path) {

                }
                if (query.host) {
                    setFormValue(sid, 'h2_host', decodeURIComponentSafe(query.host));
                }
            }

            if (query.allowInsecure === '1' || query.allowInsecure === 'true' || query.insecure === '1' || query.insecure === 'true') {
                setFormValue(sid, 'skip_cert_verify', 'true');
            }

            if (parsed.hash) {

            mergeUnknownParamsToOtherParameters(sid, collectUnknownQueryParams(query, {
                encryption: true,

                security: true,

                path: true,

            return true;
        } catch (e2) {

        }
    }
}

        setFormValue(sid, 'tc_uuid', decodeURIComponentSafe(parsed.username));
        setFormValue(sid, 'tc_password', decodeURIComponentSafe(parsed.password));
    } else {
        setFormValue(sid, 'tc_token', decodeURIComponentSafe(parsed.username));

    if (query.congestion_control || query['congestion-controller']) {
        setFormValue(sid, 'congestion_controller', decodeURIComponentSafe(query.congestion_control || query['congestion-controller']));
    }

    if (query.alpn) {
        setFormValue(sid, 'tc_alpn', decodeURIComponent(query.alpn));
    }

    if (query.sni) {
        setFormValue(sid, 'sni', decodeURIComponent(query.sni));
    }

    if (query.disable_sni === '1' || query.disable_sni === 'true') {
        setFormValue(sid, 'disable_sni', 'true');

    if (query.udp_relay_mode) {
        setFormValue(sid, 'udp_relay_mode', decodeURIComponent(query.udp_relay_mode));

    if (query.reduce_rtt === '1' || query.reduce_rtt === 'true') {
        setFormValue(sid, 'reduce_rtt', 'true');

    if (query['heartbeat-interval']) {
        setFormValue(sid, 'heartbeat_interval', decodeURIComponentSafe(query['heartbeat-interval']));
    }

    if (query['request-timeout']) {
        setFormValue(sid, 'request_timeout', decodeURIComponentSafe(query['request-timeout']));

    if (query['max-udp-relay-packet-size']) {
        setFormValue(sid, 'max_udp_relay_packet_size', decodeURIComponentSafe(query['max-udp-relay-packet-size']));

    if (query['max-open-streams']) {

    }

    if (query['fast-open']) {
        setFormValue(sid, 'fast_open', query['fast-open'] === '1' || query['fast-open'] === 'true' ? 'true' : 'false');
    }

    if (query['skip-cert-verify']) {
        setFormValue(sid, 'skip_cert_verify', query['skip-cert-verify'] === '1' || query['skip-cert-verify'] === 'true' ? 'true' : 'false');
    }

    if (parsed.hash) {
        setFormValue(sid, 'name', decodeFragment(parsed.hash.substr(1)));
    }

    mergeUnknownParamsToOtherParameters(sid, collectUnknownQueryParams(query, {
        congestion_control: true,

function parseHttp(url, sid) {

function parseAnyTLS(url, sid) {
    var parsed = parseUrl(url);
    if (!parsed) return false;

    var query = parseQuery(parsed.search);

    setFormValue(sid, 'type', 'anytls');
    setFormValue(sid, 'server', parsed.hostname);
    setFormValue(sid, 'port', parsed.port || '443');
    setFormValue(sid, 'auth_name', '');
    setFormValue(sid, 'password', decodeURIComponentSafe(parsed.password || parsed.username));

    if (query.sni) {
        setFormValue(sid, 'sni', decodeURIComponentSafe(query.sni));
    }

    if (query.alpn) {
        setFormValue(sid, 'alpn', decodeURIComponentSafe(query.alpn));
    }

    if (query.insecure === '1' || query.insecure === 'true') {
        setFormValue(sid, 'skip_cert_verify', 'true');
    }

    if (query['client-fingerprint'] || query.fp) {
        setFormValue(sid, 'client_fingerprint', decodeURIComponentSafe(query['client-fingerprint'] || query.fp));
    }

    if (query.udp) {
        setFormValue(sid, 'udp', query.udp === '1' || query.udp === 'true' ? 'true' : 'false');
    }

    if (query['idle-session-check-interval']) {
        setFormValue(sid, 'idle_session_check_interval', decodeURIComponentSafe(query['idle-session-check-interval']));
    }

    if (query['idle-session-timeout']) {
        setFormValue(sid, 'idle_session_timeout', decodeURIComponentSafe(query['idle-session-timeout']));
    }

    if (query['min-idle-session']) {
        setFormValue(sid, 'min_idle_session', decodeURIComponentSafe(query['min-idle-session']));
    }

    if (parsed.hash) {
        setFormValue(sid, 'name', decodeFragment(parsed.hash.substr(1)));
    } else {
        setFormValue(sid, 'name', parsed.hostname + ':' + parsed.port);
    }

    var unknownParams = remapParamKeys(collectUnknownQueryParams(query, {
        sni: true,
        insecure: true,
        alpn: true,
        'client-fingerprint': true,
        fp: true,
        udp: true,
        'idle-session-check-interval': true,
        'idle-session-timeout': true,
        'min-idle-session': true
    }), {
        hpkp: 'fingerprint',
        fp: 'client-fingerprint'
    });

    if (parsed.username) {
        unknownParams.username = decodeURIComponentSafe(parsed.username);
    }

    mergeUnknownParamsToOtherParameters(sid, unknownParams);

    return true;
}

function parseMieru(url, sid) {
    var parsed = parseUrl(url);
    if (!parsed) return false;

    var query = parseQuery(parsed.search);

    setFormValue(sid, 'type', 'mieru');
    setFormValue(sid, 'server', parsed.hostname);
    setFormValue(sid, 'username', decodeURIComponentSafe(parsed.username));
    setFormValue(sid, 'password', decodeURIComponentSafe(parsed.password));

    var ports = query.port ? decodeURIComponentSafe(query.port).split(',') : [];
    var protocols = query.protocol ? decodeURIComponentSafe(query.protocol).split(',') : [];
    if (ports.length > 0) {
        if (ports.length === 1) {
            if (ports[0].indexOf('-') !== -1) {
                setFormValue(sid, 'port_range', ports[0]);
            } else {
                setFormValue(sid, 'port', ports[0]);
            }
        } else {
            setFormValue(sid, 'port_range', ports.join(','));
        }
    }

    if (protocols.length > 0 && protocols[0]) {
        setFormValue(sid, 'transport', protocols[0]);
    }

    if (query.multiplexing) {
        setFormValue(sid, 'multiplexing', decodeURIComponentSafe(query.multiplexing));
    }

    if (parsed.hash) {
        setFormValue(sid, 'name', decodeFragment(parsed.hash.substr(1)));
    }

    mergeUnknownParamsToOtherParameters(sid, collectUnknownQueryParams(query, {
        port: true,
        protocol: true,
        multiplexing: true
    }));

    return true;
}
